    <!-- Primary SEO -->

      "@context": "https://schema.org",

      "name": "Vaan Tech",
      "url": "https://vaantech.com",
      "logo": "https://vaantech.com/logo.png",
      "description": "Professional web development and digital solutions company",

        "@type": "ContactPoint",
        "telephone": "+1-555-123-4567",
        "contactType": "customer service",

      },
      "sameAs": [
        "https://twitter.com/vaantech",
        "https://linkedin.com/company/vaantech",
        "https://github.com/vaantech"
      ],
      "offers": {
        "@type": "Offer",
        "description": "Web development, mobile apps, e-commerce, UI/UX design, digital marketing"
      }

    <!-- Preconnect for performance -->
